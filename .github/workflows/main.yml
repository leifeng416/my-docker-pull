name: Docker-Downloader
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save
        run: |
          # 1. 尝试教程里的名字，如果失败就尝试真正的官方名
          docker pull openclaw/openclaw:latest || docker pull smanx/openclaw:latest
          
          # 2. 获取刚才拉取成功的镜像 ID
          IMAGE_ID=$(docker images -q | head -n 1)
          
          # 3. 统一改名为你代码里需要的 local 名字
          docker tag $IMAGE_ID openclaw:local
          
          # 4. 拉取 Redis
          docker pull redis:alpine
          
          # 5. 打包
          docker save openclaw:local redis:alpine -o openclaw_images.tar
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-package
          path: openclaw_images.tar
